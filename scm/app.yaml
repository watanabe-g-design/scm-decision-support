command:
  - "sh"
  - "-c"
  - "streamlit run app.py --server.port=$DATABRICKS_APP_PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false --browser.gatherUsageStats=false"

env:
  - name: SCM_CATALOG
    value: "supply_chain_management"
  - name: SCM_SCHEMA
    value: "main"
  # SQL Warehouse ID — Databricks SQL クエリ実行に使う
  # SQL Warehouses → Connection details → HTTP path 末尾の英数字部分
  - name: SCM_WAREHOUSE_ID
    value: "c766140b51b9a698"
  # Genie Space ID — Genie 連携に使う (未設定なら Genie 機能はスキップ)
  # Genie space URL の末尾 (https://.../genie/rooms/<ここ>)
  - name: SCM_GENIE_SPACE_ID
    value: "01f1321bb85518ffa53d3c92bd30a598"
