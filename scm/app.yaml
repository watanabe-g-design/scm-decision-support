command:
  - "sh"
  - "-c"
  - "streamlit run app.py --server.port=$DATABRICKS_APP_PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false --browser.gatherUsageStats=false"

env:
  - name: SCM_CATALOG
    value: "supply_chain_management"
  - name: SCM_SCHEMA
    value: "main"
